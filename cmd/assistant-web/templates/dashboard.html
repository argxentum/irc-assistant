<!doctype html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - {{.channel}}</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
    <div class="max-w-5xl mx-auto p-6">
        <div class="flex items-center justify-between mb-8">
            <h1 class="text-2xl font-bold">Dashboard</h1>
            <div class="text-sm text-gray-400">
                {{.nick}} &middot; {{.channel}}
            </div>
        </div>

        <div id="toast" class="fixed top-4 right-4 px-4 py-2 rounded text-sm hidden z-50"></div>

        <div id="host-overlay" class="fixed inset-0 bg-black/60 z-40 hidden" onclick="closeHostPanel()"></div>
        <div id="host-panel" class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-gray-800 rounded-lg p-6 z-50 w-full max-w-2xl max-h-[80vh] overflow-y-auto hidden shadow-2xl">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-semibold">Users with host: <span id="host-panel-host" class="text-blue-400 font-mono"></span></h2>
                <button onclick="closeHostPanel()" class="text-gray-400 hover:text-gray-200 text-xl leading-none px-2">&times;</button>
            </div>
            <div id="host-loading" class="text-gray-400">Loading...</div>
            <div id="host-error" class="text-red-400 hidden"></div>
            <table id="host-table" class="w-full hidden">
                <thead>
                    <tr class="text-left text-gray-400 text-sm border-b border-gray-700">
                        <th class="pb-2">Nick</th>
                        <th class="pb-2">User ID</th>
                        <th class="pb-2">First Seen</th>
                        <th class="pb-2">Last Seen</th>
                    </tr>
                </thead>
                <tbody id="host-body"></tbody>
            </table>
        </div>

        <div class="bg-gray-800 rounded-lg p-6">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-semibold">Channel Users</h2>
                <button onclick="loadUsers()" class="text-sm bg-gray-700 hover:bg-gray-600 px-3 py-1 rounded">Refresh</button>
            </div>
            <div id="users-loading" class="text-gray-400">Loading...</div>
            <div id="users-error" class="text-red-400 hidden"></div>
            <table id="users-table" class="w-full hidden">
                <thead>
                    <tr class="text-left text-gray-400 text-sm border-b border-gray-700">
                        <th class="pb-2">Status</th>
                        <th class="pb-2">Nick</th>
                        <th class="pb-2">Host</th>
                        <th class="pb-2 text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="users-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        const statusLabels = {'@': 'op', '%': 'hop', '+': 'voice', '': ''};
        const statusColors = {'@': 'text-red-400', '%': 'text-yellow-400', '+': 'text-green-400', '': 'text-gray-500'};
        const protectedStatuses = new Set(['@', '%']);

        function showToast(message, success) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'fixed top-4 right-4 px-4 py-2 rounded text-sm z-50 ' +
                (success ? 'bg-green-800 text-green-200' : 'bg-red-800 text-red-200');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }

        async function doAction(action, nick, extra = {}) {
            if (!confirm(`${action} ${nick}?`)) return;

            try {
                const resp = await fetch(`/dashboard/api/action/${action}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({nick, ...extra})
                });
                const data = await resp.json();
                if (data.success) {
                    showToast(`${action}: ${nick}`, true);
                    setTimeout(loadUsers, 1000);
                } else {
                    showToast(data.error || 'Action failed', false);
                }
            } catch (e) {
                showToast(e.message, false);
            }
        }

        function actionButton(label, cls, onclick) {
            return `<button onclick="${onclick}" class="text-xs px-2 py-1 rounded ${cls}">${label}</button>`;
        }

        async function loadUsers() {
            const loading = document.getElementById('users-loading');
            const error = document.getElementById('users-error');
            const table = document.getElementById('users-table');
            const body = document.getElementById('users-body');

            loading.classList.remove('hidden');
            error.classList.add('hidden');
            table.classList.add('hidden');

            try {
                const resp = await fetch('/dashboard/api/users');
                if (!resp.ok) throw new Error(await resp.text());
                const users = await resp.json();

                users.sort((a, b) => {
                    const order = {'@': 0, '%': 1, '+': 2, '': 3};
                    const diff = (order[a.status] ?? 3) - (order[b.status] ?? 3);
                    if (diff !== 0) return diff;
                    return a.nick.toLowerCase().localeCompare(b.nick.toLowerCase());
                });

                body.innerHTML = '';
                for (const user of users) {
                    const tr = document.createElement('tr');
                    tr.className = 'border-b border-gray-700/50 text-sm';

                    let actions = '';
                    if (!protectedStatuses.has(user.status)) {
                        const nick = escapeAttr(user.nick);
                        actions = [
                            actionButton('Kick', 'bg-yellow-800 hover:bg-yellow-700', `doAction('kick','${nick}')`),
                            actionButton('Ban', 'bg-red-800 hover:bg-red-700', `doAction('ban','${nick}')`),
                            user.status === '+'
                                ? actionButton('Mute', 'bg-orange-800 hover:bg-orange-700', `doAction('mute','${nick}')`)
                                : actionButton('Unmute', 'bg-green-800 hover:bg-green-700', `doAction('unmute','${nick}')`),
                            user.status === ''
                                ? actionButton('Auto-voice', 'bg-blue-800 hover:bg-blue-700', `doAutoVoice('${nick}')`)
                                : ''
                        ].filter(Boolean).join(' ');
                    }

                    tr.innerHTML = `
                        <td class="py-2 ${statusColors[user.status] || 'text-gray-500'}">${statusLabels[user.status] || ''}</td>
                        <td class="py-2">${escapeHtml(user.nick)}</td>
                        <td class="py-2"><a href="#" onclick="loadHostUsers('${escapeAttr(user.host)}'); return false;" class="text-blue-400 hover:text-blue-300 hover:underline">${escapeHtml(user.host)}</a></td>
                        <td class="py-2 text-right space-x-1">${actions}</td>
                    `;
                    body.appendChild(tr);
                }

                loading.classList.add('hidden');
                table.classList.remove('hidden');
            } catch (e) {
                loading.classList.add('hidden');
                error.textContent = e.message;
                error.classList.remove('hidden');
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function escapeAttr(text) {
            return text.replace(/'/g, "\\'").replace(/"/g, '&quot;');
        }

        async function doAutoVoice(nick) {
            if (!confirm(`Auto-voice ${nick}?`)) return;
            try {
                const resp = await fetch('/dashboard/api/autovoice', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({nick})
                });
                const data = await resp.json();
                if (data.success) {
                    showToast(`Auto-voiced: ${nick}`, true);
                } else {
                    showToast(data.error || 'Action failed', false);
                }
            } catch (e) {
                showToast(e.message, false);
            }
        }

        function closeHostPanel() {
            document.getElementById('host-panel').classList.add('hidden');
            document.getElementById('host-overlay').classList.add('hidden');
        }

        function formatDate(unix) {
            if (!unix || unix <= 0) return '';
            const d = new Date(unix * 1000);
            return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
        }

        async function loadHostUsers(host) {
            const panel = document.getElementById('host-panel');
            const loading = document.getElementById('host-loading');
            const error = document.getElementById('host-error');
            const table = document.getElementById('host-table');
            const body = document.getElementById('host-body');

            document.getElementById('host-panel-host').textContent = host;
            document.getElementById('host-overlay').classList.remove('hidden');
            panel.classList.remove('hidden');
            loading.classList.remove('hidden');
            error.classList.add('hidden');
            table.classList.add('hidden');

            try {
                const resp = await fetch(`/dashboard/api/users/host/${encodeURIComponent(host)}`);
                if (!resp.ok) throw new Error(await resp.text());
                const users = await resp.json();

                users.sort((a, b) => b.updated_at - a.updated_at);

                body.innerHTML = '';
                for (const user of users) {
                    const tr = document.createElement('tr');
                    tr.className = 'border-b border-gray-700/50 text-sm';
                    tr.innerHTML = `
                        <td class="py-2">${escapeHtml(user.nick)}</td>
                        <td class="py-2 text-gray-400">${escapeHtml(user.user_id)}</td>
                        <td class="py-2 text-gray-400">${formatDate(user.created_at)}</td>
                        <td class="py-2 text-gray-400">${formatDate(user.updated_at)}</td>
                    `;
                    body.appendChild(tr);
                }

                loading.classList.add('hidden');
                table.classList.remove('hidden');
            } catch (e) {
                loading.classList.add('hidden');
                error.textContent = e.message;
                error.classList.remove('hidden');
            }
        }

        loadUsers();
    </script>
</body>
</html>
