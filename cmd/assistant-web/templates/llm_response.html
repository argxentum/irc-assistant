<!doctype html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{.name}} — {{.prompt}}</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        #content ol { list-style: decimal; padding-left: 1.5rem; margin: 0.5rem 0; }
        #content ul { list-style: disc; padding-left: 1.5rem; margin: 0.5rem 0; }
        #content li { margin: 0.25rem 0; }
        #content p { margin: 0.5rem 0; }
    </style>
</head>
<body class="bg-gray-200 text-gray-900 min-h-screen p-6 transition-colors duration-200">
    <div class="max-w-3xl mx-auto">
        <div class="mb-6 flex items-start justify-between">
            <div>
                <h1 class="text-2xl font-bold">{{.name}}</h1>
                <p class="text-sm text-gray-500 mt-1"><span id="created"></span> · {{.channel}} · {{.nick}}</p>
            </div>
            <button id="theme-toggle" onclick="toggleTheme()" class="mt-1 px-3 py-1 text-xs rounded-full border border-gray-400 text-gray-600 hover:bg-gray-300 transition-colors duration-200">
                Dark
            </button>
        </div>

        <div class="mb-4 p-4 bg-white border border-gray-200 rounded-lg transition-colors duration-200" id="prompt-card">
            <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1">Prompt</p>
            <p class="text-gray-800" id="prompt-text">{{.prompt}}</p>
        </div>

        <div class="p-4 bg-white border border-gray-200 rounded-lg transition-colors duration-200" id="response-card">
            <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-3">Response</p>
            <div id="content" class="prose max-w-none text-gray-800"></div>
        </div>
    </div>

    <script>
        marked.use({ breaks: true });
        document.getElementById('created').textContent = new Date({{.created}}).toLocaleString();
        const raw = {{.content}};
        const normalized = raw.replace(/([^\n])\n?(\d+\. )/g, '$1\n\n$2');
        document.getElementById('content').innerHTML = marked.parse(normalized);

        const dark = {
            body:     ['bg-gray-200', 'text-gray-900', 'bg-gray-900', 'text-gray-100'],
            cards:    ['bg-white', 'border-gray-200', 'text-gray-800', 'bg-gray-800', 'border-gray-700', 'text-gray-100'],
            meta:     ['text-gray-500', 'text-gray-400'],
            toggle:   ['border-gray-400', 'text-gray-600', 'hover:bg-gray-300', 'border-gray-600', 'text-gray-300', 'hover:bg-gray-700'],
        };

        function toggleTheme() {
            const isDark = document.body.classList.contains('bg-gray-900');
            const btn = document.getElementById('theme-toggle');

            if (isDark) {
                document.body.classList.replace('bg-gray-900', 'bg-gray-200');
                document.body.classList.replace('text-gray-100', 'text-gray-900');
                document.querySelectorAll('#prompt-card, #response-card').forEach(el => {
                    el.classList.replace('bg-gray-800', 'bg-white');
                    el.classList.replace('border-gray-700', 'border-gray-200');
                });
                document.getElementById('prompt-text').classList.replace('text-gray-100', 'text-gray-800');
                document.getElementById('content').classList.replace('text-gray-100', 'text-gray-800');
                document.querySelectorAll('.meta-label').forEach(el => el.classList.replace('text-gray-500', 'text-gray-400'));
                btn.classList.replace('border-gray-600', 'border-gray-400');
                btn.classList.replace('text-gray-300', 'text-gray-600');
                btn.classList.replace('hover:bg-gray-700', 'hover:bg-gray-300');
                btn.textContent = 'Dark';
            } else {
                document.body.classList.replace('bg-gray-200', 'bg-gray-900');
                document.body.classList.replace('text-gray-900', 'text-gray-100');
                document.querySelectorAll('#prompt-card, #response-card').forEach(el => {
                    el.classList.replace('bg-white', 'bg-gray-800');
                    el.classList.replace('border-gray-200', 'border-gray-700');
                });
                document.getElementById('prompt-text').classList.replace('text-gray-800', 'text-gray-100');
                document.getElementById('content').classList.replace('text-gray-800', 'text-gray-100');
                btn.classList.replace('border-gray-400', 'border-gray-600');
                btn.classList.replace('text-gray-600', 'text-gray-300');
                btn.classList.replace('hover:bg-gray-300', 'hover:bg-gray-700');
                btn.textContent = 'Light';
            }

            localStorage.setItem('theme', isDark ? 'light' : 'dark');
        }

        // restore saved preference
        if (localStorage.getItem('theme') === 'dark') toggleTheme();
    </script>
</body>
</html>
