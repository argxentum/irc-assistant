<!doctype html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{.name}} — {{.prompt}}</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-page:   #e5e7eb;
            --bg-card:   #ffffff;
            --bd-card:   #e5e7eb;
            --tx-main:   #111827;
            --tx-meta:   #6b7280;
            --tx-label:  #9ca3af;
            --tx-body:   #1f2937;
        }
        html.dark {
            --bg-page:   #111827;
            --bg-card:   #1f2937;
            --bd-card:   #374151;
            --tx-main:   #f9fafb;
            --tx-meta:   #9ca3af;
            --tx-label:  #6b7280;
            --tx-body:   #e5e7eb;
        }
        body        { background: var(--bg-page); color: var(--tx-main); transition: background .2s, color .2s; }
        .card       { background: var(--bg-card); border-color: var(--bd-card); }
        .tx-meta    { color: var(--tx-meta); }
        .tx-label   { color: var(--tx-label); }
        .tx-body    { color: var(--tx-body); }
        #content ol { list-style: decimal; padding-left: 1.5rem; margin: 0.5rem 0; }
        #content ul { list-style: disc;    padding-left: 1.5rem; margin: 0.5rem 0; }
        #content li { margin: 0.25rem 0; }
        #content p  { margin: 0.5rem 0; }
    </style>
</head>
<body class="min-h-screen p-6">
    <div class="max-w-3xl mx-auto">
        <div class="mb-6 flex items-start justify-between">
            <div>
                <h1 class="text-2xl font-bold">{{.name}}</h1>
                <p class="tx-meta text-sm mt-1"><span id="created"></span> · {{.channel}} · {{.nick}}</p>
            </div>
            <button id="theme-toggle" onclick="toggleTheme()" class="mt-1 px-3 py-1 text-xs rounded-full border tx-meta hover:opacity-70 transition-opacity duration-200 card">
                Dark
            </button>
        </div>

        <div class="card mb-4 p-4 border rounded-lg">
            <p class="tx-label text-xs font-semibold uppercase tracking-wide mb-1">Prompt</p>
            <p class="tx-body">{{.prompt}}</p>
        </div>

        <div class="card p-4 border rounded-lg">
            <p class="tx-label text-xs font-semibold uppercase tracking-wide mb-3">Response</p>
            <div id="content" class="tx-body prose max-w-none"></div>
        </div>

        <p class="tx-label text-xs text-center mt-4">LLMs can make mistakes. Verify important information.</p>
    </div>

    <script>
        marked.use({ breaks: true });
        document.getElementById('created').textContent = new Date({{.created}}).toLocaleString();
        const raw = {{.content}};
        const normalized = raw.replace(/([^\n])\n?(\d+\. )/g, '$1\n\n$2');
        document.getElementById('content').innerHTML = marked.parse(normalized);

        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            document.getElementById('theme-toggle').textContent = isDark ? 'Light' : 'Dark';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        if (localStorage.getItem('theme') === 'dark') toggleTheme();
    </script>
</body>
</html>
