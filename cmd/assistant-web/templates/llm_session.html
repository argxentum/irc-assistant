<!doctype html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{.name}} — {{.nick}} in {{.channel}}</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-page:   #e5e7eb;
            --bg-card:   #ffffff;
            --bd-card:   #e5e7eb;
            --tx-main:   #111827;
            --tx-meta:   #6b7280;
            --tx-label:  #9ca3af;
            --tx-body:   #1f2937;
        }
        html.dark {
            --bg-page:   #111827;
            --bg-card:   #1f2937;
            --bd-card:   #374151;
            --tx-main:   #f9fafb;
            --tx-meta:   #9ca3af;
            --tx-label:  #6b7280;
            --tx-body:   #e5e7eb;
        }
        body     { background: var(--bg-page); color: var(--tx-main); transition: background .2s, color .2s; }
        .card    { background: var(--bg-card); border-color: var(--bd-card); }
        .tx-meta  { color: var(--tx-meta); }
        .tx-label { color: var(--tx-label); }
        .tx-body  { color: var(--tx-body); }
        .response ol { list-style: decimal; padding-left: 1.5rem; margin: 0.5rem 0; }
        .response ul { list-style: disc;    padding-left: 1.5rem; margin: 0.5rem 0; }
        .response li { margin: 0.25rem 0; }
        .response p  { margin: 0.5rem 0; }
    </style>
</head>
<body class="min-h-screen p-6">
    <div class="max-w-3xl mx-auto">
        <div class="mb-6 flex items-start justify-between">
            <div>
                <h1 class="text-2xl font-bold">{{.name}}</h1>
                <p class="tx-meta text-sm mt-1">{{.channel}} · {{.nick}}</p>
            </div>
            <button onclick="toggleTheme()" id="theme-toggle" class="mt-1 px-3 py-1 text-xs rounded-full border tx-meta hover:opacity-70 transition-opacity duration-200 card">
                Dark
            </button>
        </div>

        <div id="entries"></div>

        <p class="tx-label text-xs text-center mt-4">LLMs can make mistakes. Verify important information.</p>
    </div>

    <script>
        marked.use({ breaks: true });

        function escapeHtml(s) {
            return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function renderEntry(prompt, content, created, complete) {
            const normalized = content.replace(/([.!?:])\s*(\d+\. )/g, '$1\n\n$2');
            const responseBody = complete
                ? `<div class="response tx-body">${marked.parse(normalized)}</div>`
                : `<div class="flex items-center gap-2 tx-meta text-sm">
                       <svg class="animate-spin h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                           <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                           <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
                       </svg>
                       Processing…${content.length > 0 ? ' <span class="tx-body ml-2">' + escapeHtml(content.split('\n')[0].slice(0, 120)) + '…</span>' : ''}
                   </div>`;
            return `
                <div class="card border rounded-lg mb-4 overflow-hidden">
                    <div class="px-4 pt-4 pb-3 border-b" style="border-color: var(--bd-card)">
                        <p class="tx-label text-xs font-semibold uppercase tracking-wide mb-1">Prompt</p>
                        <p class="tx-body text-sm">${escapeHtml(prompt)}</p>
                        <p class="tx-meta text-xs mt-2">${new Date(created).toLocaleString()}</p>
                    </div>
                    <div class="px-4 py-3">
                        <p class="tx-label text-xs font-semibold uppercase tracking-wide mb-2">Response</p>
                        ${responseBody}
                    </div>
                </div>`;
        }

        const entries = [
            {{range .entries}}[{{.Prompt}}, {{.Content}}, {{.Created}}, "{{.ID}}", {{.Complete}}],
            {{end}}
        ];

        const container = document.getElementById('entries');
        entries.forEach(([prompt, content, created, id, complete]) => {
            container.insertAdjacentHTML('beforeend', `<div id="${id}">${renderEntry(prompt, content, created, complete)}</div>`);
        });

        {{if .anyProcessing}}
        setTimeout(() => location.reload(), 5000);
        {{end}}

        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            document.getElementById('theme-toggle').textContent = isDark ? 'Light' : 'Dark';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        if (localStorage.getItem('theme') === 'dark') toggleTheme();
    </script>
</body>
</html>
